name: "RC522 Reader"
description: "Reads RC522 via SPI and publishes UID to MQTT"
version: "0.5.7"
slug: "rc522_reader"
init: false
startup: services

arch:
  - aarch64

devices:
  - /dev/spidev0.0
  - /dev/spidev0.1
  - /dev/spidev10.0
  - /dev/spidev10.1
  - /dev/gpiochip0

options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  topic_base: "rfid/rc522"
  spi_path: ""
  spi_bus: 0
  spi_device: 0
  poll_ms: 200
  removed_ms: 800
  debug: false

schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  topic_base: str
  spi_path: str?
  spi_bus: "int(0,10)"
  spi_device: "int(0,1)"
  poll_ms: "int(50,2000)"
  removed_ms: "int(100,5000)"
  debug: bool

# Für den ersten Test noch drin lassen.
# Wenn der gpiochip-Reset stabil läuft, kannst du SYS_RAWIO/map gpio
# später testweise entfernen.
privileged:
  - SYS_RAWIO
map:
  - gpio